services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chess-app:latest
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_SHELL_INTERACTIVE_ENABLED=true
      - SPRING_SHELL_CONTEXT_CLOSE=false
    stdin_open: true
    tty: true
    restart: unless-stopped
  gradle:
    image: gradle:9.4.1-jdk21
    working_dir: /home/gradle/project
    volumes:
      - .:/home/gradle/project
      - gradle-cache:/home/gradle/.gradle
    ports:
      - "8080:8080"

volumes:
  gradle-cache:
